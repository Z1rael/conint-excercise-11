<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post-Dialog</title>
    <style>
    .blue {
      background-color: blue;
    }

    .green {
      background-color: green;
    }
  </style>
</head>
<body>


  <h1>Make Post</h1>
<div>
  <form id="user-registration">
    <input type="text" id="username" placeholder="John Doe">
    <input type="email" id="email-user">
    <button type="submit" id="create-user">Create User</button>
  </form>
</div>
<br>
<div>
  <form id="post-form">
    <input type="text" id="title-input" placeholder="Post-Title" required/>
    <input type="text" id="post-input" placeholder="Add a new Post" required/>
    <button id="make-post" type="submit">Post</button>
  </form>
</div>


  <script>

    posthog.init('${posthog_api_key}', {
        api_host: 'https://eu.i.posthog.com',
        person_profiles: 'identified_only', // or 'always' to create profiles for anonymous users as well

  <script>
    const API_BASE = '/api/v1/posts';
    const postForm = document.getElementById('post-form');
    const postInput = document.getElementById('post-input');
    const titleInput = document.getElementById('title-input');


    //Fearture Toggle 
    if (!posthog.isFeatureEnabled('is-post-creation-enabled') ) {
       document.getElementById('make-post').hidden;
    }

    //A-B Green-Blue 
    if (posthog.getFeatureFlag('experiment-user-button-style') === 'test') {
      document.getElementById('make-post').classList.add("blue")
    } else {
       document.getElementById('make-post').classList.add("green")
    }


    // Create a new post (POST)
    async function createPost(title, text) {
      try {
        const response = await fetch(API_BASE, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: title, content: text, userId: 1 })
        });
        if (!response.ok) {
          const { error } = await response.json();
          alert(error);
        }
      } catch (error) {
        console.error('Error creating post:', error);
      }
    }


    // Handle form submission to create a new post
    // the events are tracked by default and categorized by variants
    postForm.addEventListener('submit', event => {
      event.preventDefault();
      const text = postInput.value.trim();
      const title = titleInput.value.trim();
      if (text && title) {
        createPost(title, text);

        postInput.value = '';
      }
    });

  </script>
</body>
</html>
